<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsha | Filmmaker</title>

    <link rel="stylesheet" href="style.css">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<header>
    <div class="logo">HARSHA</div>
    <nav>
        <ul>
            <li><a href="#hero">Home</a></li>
            <li><a href="#projects">Projects</a></li>
        </ul>
    </nav>
</header>

<!-- HERO -->
<section id="hero">
    <video autoplay muted loop id="bg-video">
        <source src="cinematic.mp4" type="video/mp4">
    </video>

    <div class="hero-content">
        <h1>
            Cinematic Vision <br>
            Meets VFX Creativity
        </h1>

        <p>Filmmaker · Cinematographer · VFX Artist</p>

        <a class="btn" href="#projects">View My Work</a>
    </div>
</section>

<!-- PROJECTS -->
<section id="projects">
    <h2>My Work</h2>

    <div class="project-grid">

        <div class="project-card">
            <div class="thumb"></div>
            <h3>Cinematic Photography</h3>
        </div>

        <div class="project-card">
            <div class="thumb"></div>
            <h3>Short Films</h3>
        </div>

        <div class="project-card">
            <div class="thumb"></div>
            <h3>Cinematography</h3>
        </div>

    </div>
</section>

</body>
</html>
